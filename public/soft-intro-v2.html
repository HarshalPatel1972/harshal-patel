<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Outfit:wght@100;200;300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --paper:  #F2EAE0;
    --paper2: #E8DDD0;
    --ink:    #1A1410;
    --rose:   #C4735A;
    --rose-lt:#E8A898;
    --mist:   rgba(196,115,90,0.12);
  }

  html, body { width:100%; height:100%; overflow:hidden; background:var(--paper); }

  /* ── IMAGE — washed bleed, not a portrait ─────────────── */
  .img-bleed {
    position:fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
  }
  .img-bleed img {
    width:100%; height:100%;
    object-fit:cover;
    object-position:center;
    filter: grayscale(100%);
    opacity: 1;
  }
  /* Overlay to soften the contrast/brightness of the image */
  .img-bleed::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background: rgba(242, 234, 224, 0.45); /* 45% paper wash overlay */
    display: block;
  }
  .img-bleed::after {
    display: none;
  }

  /* ── DECORATIVE BIG " ─────────────────────────────────── */
  .big-quote {
    position:fixed;
    top: -20px; left: 32px;
    font-family: 'Playfair Display', serif;
    font-size: clamp(220px, 28vw, 320px);
    font-style: italic;
    line-height:1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(196,115,90,0.18);
    z-index: 1;
    pointer-events:none;
    user-select:none;
    opacity:0;
    animation: fadeOnly 1.4s ease 0.5s forwards;
  }

  /* ── STAGE ────────────────────────────────────────────── */
  .stage {
    position:fixed; inset:0; z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* ── LEFT VERTICAL NAME ───────────────────────────────── */
  .name-vert {
    position:fixed;
    left: 22px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: center center;
    font-family: 'Outfit', sans-serif;
    font-weight: 100;
    font-size: 10px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--rose);
    opacity:0;
    white-space: nowrap;
    animation: fadeOnly 1s ease 2.2s forwards;
    z-index:10;
  }

  /* small rose dot accent beside name */
  .name-dot {
    position:fixed;
    left: 17px;
    top: calc(50% + 52px);
    width: 4px; height: 4px;
    border-radius:50%;
    background: var(--rose);
    opacity:0;
    animation: fadeOnly 1s ease 2.5s forwards;
    z-index:10;
  }

  /* ── QUOTE BLOCK — deconstructed ─────────────────────── */
  .quote-field {
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap: 12px;
    z-index:5;
  }

  /* each line is centered + arrives from alternate directions */
  .ql {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.15;
    opacity:0;
    white-space: nowrap;
    text-align: center;
  }
  .ql-1 {
    font-size: clamp(28px, 4.2vw, 52px);
    transform: translateX(-30px) rotate(-0.5deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
  }
  .ql-2 {
    font-size: clamp(28px, 4.2vw, 52px);
    transform: translateX(30px) rotate(0.3deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 0.92s forwards;
  }
  .ql-3 {
    font-size: clamp(28px, 4.2vw, 52px);
    transform: translateX(-20px) rotate(-0.2deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 1.12s forwards;
  }
  .ql-4 {
    font-size: clamp(28px, 4.2vw, 52px);
    transform: translateX(20px) rotate(0.4deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 1.32s forwards;
  }
  .ql-5 {
    font-size: clamp(28px, 4.2vw, 52px);
    transform: translateX(-15px) rotate(-0.3deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 1.5s forwards;
  }

  /* highlight accent on key word */
  .ql em {
    font-style: italic;
    color: var(--rose);
    position:relative;
  }
  .ql em::after {
    content:'';
    position:absolute;
    bottom:2px; left:0; right:0;
    height:1.5px;
    background: var(--rose-lt);
    transform:scaleX(0);
    transform-origin:left;
    animation: underlineIn 0.6s ease 2s forwards;
  }

  /* ── THIN RULE + INLINE NAME ──────────────────────────── */
  .attribution {
    margin-top: 36px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 16px;
    opacity:0;
    transform: translateY(10px);
    animation: riseIn 0.8s ease 1.9s forwards;
  }
  .attr-line {
    width: 36px; height: 1px;
    background: var(--rose);
    opacity:0.5;
    flex-shrink:0;
  }
  .attr-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--rose);
  }

  /* ── BOTTOM PROGRESS LINE ─────────────────────────────── */
  .progress {
    position:fixed;
    bottom:0; left:0;
    height:2px;
    background: linear-gradient(90deg, var(--rose), var(--rose-lt));
    width:0%;
    z-index:20;
    animation: prog 2.8s cubic-bezier(0.4,0,0.6,1) 0.1s forwards;
  }

  /* ── SKIP ─────────────────────────────────────────────── */
  .skip {
    position:fixed; bottom:20px; right:28px; z-index:30;
    font-family:'Outfit',sans-serif; font-size:9px;
    letter-spacing:0.28em; text-transform:uppercase;
    color:rgba(196,115,90,0.4); cursor:pointer;
    opacity:0; animation:fadeOnly 1s ease 2.5s forwards;
    transition:color 0.3s;
  }
  .skip:hover { color:var(--rose); }

  /* ── FLOATING SOFT CIRCLES (atmosphere) ──────────────── */
  .orb {
    position:fixed; border-radius:50%;
    background: radial-gradient(circle, var(--mist) 0%, transparent 70%);
    pointer-events:none; z-index:1;
    animation:orbFloat 8s ease-in-out infinite;
  }
  .orb-1 { width:380px;height:380px; top:-80px; left:30%;  animation-delay:0s;   opacity:0.6; }
  .orb-2 { width:260px;height:260px; bottom:-60px;left:14%; animation-delay:-3s; opacity:0.5; }
  .orb-3 { width:180px;height:180px; top:55%; right:30%;   animation-delay:-5s; opacity:0.4; }

  /* ── KEYFRAMES ────────────────────────────────────────── */
  @keyframes imgReveal {
    to { opacity:0.45; transform:scale(1); }
  }
  @keyframes fadeOnly {
    to { opacity:1; }
  }
  @keyframes lineIn {
    to { opacity:1; transform:translateX(0) rotate(var(--r,0deg)); }
  }
  @keyframes riseIn {
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes underlineIn {
    to { transform:scaleX(1); }
  }
  @keyframes prog {
    0%   { width:0%; }   60%  { width:70%; }  100% { width:100%; }
  }
  @keyframes orbFloat {
    0%,100% { transform:translateY(0); }
    50%     { transform:translateY(-18px); }
  }

  /* ambient dust particles floating animation */
  @keyframes sparkleFloat {
    0%, 100% { transform: translateY(0) translateX(0) scale(1); }
    50% { transform: translateY(-60px) translateX(25px) scale(1.12); }
  }

  /* ── SMOOTH PARALLAX SUPPORT ── */
  .stage, .img-bleed {
    transition: transform 0.45s cubic-bezier(0.1, 0.8, 0.3, 1);
    will-change: transform;
  }

  /* ── CUSTOM INERTIAL CURSOR ── */
  html.has-hover, html.has-hover body {
    cursor: none;
  }
  html.has-hover a, html.has-hover button, html.has-hover .skip, html.has-hover #stage {
    cursor: none !important;
  }
  .cursor-trailer {
    width: 24px;
    height: 24px;
    border: 1px solid var(--rose);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.25s ease, height 0.25s ease, background-color 0.25s ease, border-color 0.25s ease;
    will-change: width, height, transform;
    display: none;
  }
  .cursor-dot {
    width: 6px;
    height: 6px;
    background-color: var(--rose);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    will-change: transform;
    display: none;
  }
  body.cursor-hover .cursor-trailer {
    width: 48px;
    height: 48px;
    background-color: rgba(196, 115, 90, 0.08);
    border-color: var(--rose-lt);
  }

  /* ── CLICK PARTICLES ── */
  .click-mote {
    position: fixed;
    width: 5px;
    height: 5px;
    background-color: var(--rose);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    animation: clickExplode 0.75s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  }
  @keyframes clickExplode {
    to {
      transform: translate(var(--tx), var(--ty)) scale(0);
      opacity: 0;
    }
  }

  /* ── EXIT ─────────────────────────────────────────────── */
  .out { animation: exitFade 0.65s ease forwards !important; }
  @keyframes exitFade {
    to { opacity:0; transform:translateY(-18px); }
  }
</style>
</head>
<body>

<!-- Custom cursor markup -->
<div class="cursor-trailer" id="c-trailer"></div>
<div class="cursor-dot" id="c-dot"></div>

<!-- atmospheric orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- washed image bleed from right -->
<div class="img-bleed" id="bleed">
  <img src="TOJI FUSHIGURO.png" alt="Toji Fushiguro"/>
</div>

<!-- decorative oversized quote mark -->
<div class="big-quote">"</div>

<!-- vertical name (left rail) -->
<div class="name-vert">Toji Fushiguro</div>
<div class="name-dot"></div>

<!-- main stage -->
<div class="stage" id="stage">
  <div class="quote-field">

    <span class="ql ql-1">Talent is just</span>
    <span class="ql ql-2">the starting</span>
    <span class="ql ql-3"><em>point.</em></span>
    <span class="ql ql-4">Will is what</span>
    <span class="ql ql-5">finishes it.</span>

    <div class="attribution">
      <div class="attr-line"></div>
      <span class="attr-name">Toji Fushiguro</span>
    </div>
  </div>
</div>

<div class="progress"></div>
<div class="skip" id="skip">skip ↗</div>

<script>
  // Dismiss/Skip handler
  const dismiss = () => {
    ['stage','bleed'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('out');
    });
  };
  const t = setTimeout(dismiss, 5500); // Extended slightly so the user can enjoy the interactive elements
  
  const stageEl = document.getElementById('stage');
  const skipEl = document.getElementById('skip');
  
  if (stageEl) {
    stageEl.addEventListener('click', () => { clearTimeout(t); dismiss(); });
  }
  if (skipEl) {
    skipEl.addEventListener('click',  () => { clearTimeout(t); dismiss(); });
  }

  // Custom Cursor Inertial Physics
  const trailer = document.getElementById('c-trailer');
  const dot = document.getElementById('c-dot');
  
  let mouse = { x: 0, y: 0 };
  let trailerPos = { x: 0, y: 0 };
  let dotPos = { x: 0, y: 0 };
  let hasHoverInitialized = false;

  document.addEventListener('mousemove', (e) => {
    // Enable custom cursor styles only on devices with mouse hovering support
    if (!hasHoverInitialized) {
      document.documentElement.classList.add('has-hover');
      if (trailer) trailer.style.display = 'block';
      if (dot) dot.style.display = 'block';
      hasHoverInitialized = true;
    }

    mouse.x = e.clientX;
    mouse.y = e.clientY;

    // Interactive 3D Parallax Movement
    const x = (window.innerWidth / 2 - e.clientX) / 45;
    const y = (window.innerHeight / 2 - e.clientY) / 45;
    
    const bleed = document.getElementById('bleed');
    const stage = document.getElementById('stage');
    
    if (bleed) {
      bleed.style.transform = `translate3d(${-x * 0.5}px, ${-y * 0.5}px, 0) scale(1.02)`;
    }
    if (stage) {
      stage.style.transform = `translate3d(${x * 0.8}px, ${y * 0.8}px, 0)`;
    }
  });

  // LERP logic for premium cursor lag/inertia
  const lerp = (start, end, amt) => (1 - amt) * start + amt * end;
  
  const animateCursor = () => {
    trailerPos.x = lerp(trailerPos.x, mouse.x, 0.12);
    trailerPos.y = lerp(trailerPos.y, mouse.y, 0.12);
    
    dotPos.x = lerp(dotPos.x, mouse.x, 0.35);
    dotPos.y = lerp(dotPos.y, mouse.y, 0.35);

    if (trailer) {
      trailer.style.left = `${trailerPos.x}px`;
      trailer.style.top = `${trailerPos.y}px`;
    }
    if (dot) {
      dot.style.left = `${dotPos.x}px`;
      dot.style.top = `${dotPos.y}px`;
    }
    requestAnimationFrame(animateCursor);
  };
  requestAnimationFrame(animateCursor);

  // Hover animations for magnetic elements
  const addHoverEffects = () => {
    const hoverTargets = [skipEl, stageEl, document.querySelector('.big-quote'), document.querySelector('.attribution')];
    hoverTargets.forEach(el => {
      if (!el) return;
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });
  };
  addHoverEffects();

  // Click Particle Burst Animation
  document.addEventListener('click', (e) => {
    const count = 12;
    for (let i = 0; i < count; i++) {
      const mote = document.createElement('div');
      mote.className = 'click-mote';
      mote.style.left = `${e.clientX}px`;
      mote.style.top = `${e.clientY}px`;

      // Set target explosion offsets as CSS variables
      const angle = (i / count) * Math.PI * 2 + (Math.random() * 0.4 - 0.2);
      const distance = Math.random() * 65 + 30;
      const tx = Math.cos(angle) * distance;
      const ty = Math.sin(angle) * distance;

      mote.style.setProperty('--tx', `${tx}px`);
      mote.style.setProperty('--ty', `${ty}px`);
      
      // Randomize background palette matching
      const colors = ['#C4735A', '#E8A898', '#1A1410'];
      mote.style.background = colors[Math.floor(Math.random() * colors.length)];

      document.body.appendChild(mote);
      
      // Remove mote once animation completes
      setTimeout(() => mote.remove(), 750);
    }
  });

  // Ambient floating ink/sparkle motes
  const createSparkles = () => {
    const container = document.createElement('div');
    container.style.position = 'fixed';
    container.style.inset = '0';
    container.style.pointerEvents = 'none';
    container.style.zIndex = '1';
    document.body.appendChild(container);

    const colors = ['#C4735A', '#E8A898', '#1A1410'];
    for (let i = 0; i < 24; i++) {
      const sparkle = document.createElement('div');
      const size = Math.random() * 4 + 1.5;
      sparkle.style.width = `${size}px`;
      sparkle.style.height = `${size}px`;
      sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
      sparkle.style.borderRadius = '50%';
      sparkle.style.position = 'absolute';
      sparkle.style.top = `${Math.random() * 100}%`;
      sparkle.style.left = `${Math.random() * 100}%`;
      sparkle.style.opacity = Math.random() * 0.22 + 0.05;
      sparkle.style.filter = 'blur(0.5px)';
      sparkle.style.animation = `sparkleFloat ${Math.random() * 10 + 8}s ease-in-out infinite`;
      sparkle.style.animationDelay = `${Math.random() * -10}s`;
      container.appendChild(sparkle);
    }
  };

  createSparkles();
</script>

</body>
</html>
