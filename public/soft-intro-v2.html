<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Outfit:wght@100;200;300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --paper:  #F2EAE0;
    --paper2: #E8DDD0;
    --ink:    #1A1410;
    --rose:   #C4735A;
    --rose-lt:#E8A898;
    --mist:   rgba(196,115,90,0.12);
  }

  html, body { width:100%; height:100%; overflow:hidden; background:var(--paper); }

  /* ── IMAGE — washed bleed, not a portrait ─────────────── */
  .img-bleed {
    position:fixed;
    right: -4%;
    top: -4%;
    width: 68%;
    height: 108%;
    z-index: 0;
    overflow: hidden;
  }
  .img-bleed img {
    width:100%; height:100%;
    object-fit:cover;
    object-position:40% 18%;
    filter: saturate(0.15) brightness(1.1) contrast(0.82);
    mix-blend-mode: multiply;
    opacity: 0;
    transform: scale(1.06);
    animation: imgReveal 2s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
  }
  /* paper-wash gradient over image — left fade */
  .img-bleed::before {
    content:''; position:absolute; inset:0; z-index:1;
    background: linear-gradient(
      105deg,
      var(--paper) 0%,
      var(--paper) 18%,
      rgba(242,234,224,0.85) 35%,
      rgba(242,234,224,0.3) 60%,
      transparent 100%
    );
  }
  /* top & bottom paper fade */
  .img-bleed::after {
    content:''; position:absolute; inset:0; z-index:1;
    background:
      linear-gradient(180deg, var(--paper) 0%, transparent 14%, transparent 82%, var(--paper) 100%);
  }

  /* ── DECORATIVE BIG " ─────────────────────────────────── */
  .big-quote {
    position:fixed;
    top: -20px; left: 32px;
    font-family: 'Playfair Display', serif;
    font-size: clamp(220px, 28vw, 320px);
    font-style: italic;
    line-height:1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(196,115,90,0.18);
    z-index: 1;
    pointer-events:none;
    user-select:none;
    opacity:0;
    animation: fadeOnly 1.4s ease 0.5s forwards;
  }

  /* ── STAGE ────────────────────────────────────────────── */
  .stage {
    position:fixed; inset:0; z-index:2;
    display:flex;
    align-items:center;
  }

  /* ── LEFT VERTICAL NAME ───────────────────────────────── */
  .name-vert {
    position:fixed;
    left: 22px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: center center;
    font-family: 'Outfit', sans-serif;
    font-weight: 100;
    font-size: 10px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--rose);
    opacity:0;
    white-space: nowrap;
    animation: fadeOnly 1s ease 2.2s forwards;
    z-index:10;
  }

  /* small rose dot accent beside name */
  .name-dot {
    position:fixed;
    left: 17px;
    top: calc(50% + 52px);
    width: 4px; height: 4px;
    border-radius:50%;
    background: var(--rose);
    opacity:0;
    animation: fadeOnly 1s ease 2.5s forwards;
    z-index:10;
  }

  /* ── QUOTE BLOCK — deconstructed ─────────────────────── */
  .quote-field {
    position:relative;
    left: 8%;
    display:flex;
    flex-direction:column;
    gap: 4px;
    z-index:5;
  }

  /* each line is offset + arrives from its own direction */
  .ql {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.15;
    opacity:0;
    white-space: nowrap;
  }
  .ql-1 {
    font-size: clamp(28px, 4.2vw, 52px);
    margin-left: 0px;
    transform: translateX(-40px) rotate(-0.6deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
  }
  .ql-2 {
    font-size: clamp(28px, 4.2vw, 52px);
    margin-left: clamp(32px, 4vw, 64px);
    transform: translateX(-50px) rotate(0.4deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 0.92s forwards;
  }
  .ql-3 {
    font-size: clamp(28px, 4.2vw, 52px);
    margin-left: clamp(12px, 2vw, 28px);
    transform: translateX(-36px) rotate(-0.3deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 1.12s forwards;
  }
  .ql-4 {
    font-size: clamp(28px, 4.2vw, 52px);
    margin-left: clamp(52px, 6vw, 96px);
    transform: translateX(-44px) rotate(0.5deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 1.32s forwards;
  }
  .ql-5 {
    font-size: clamp(28px, 4.2vw, 52px);
    margin-left: clamp(20px, 3vw, 44px);
    transform: translateX(-30px) rotate(-0.4deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 1.5s forwards;
  }

  /* highlight accent on key word */
  .ql em {
    font-style: italic;
    color: var(--rose);
    position:relative;
  }
  .ql em::after {
    content:'';
    position:absolute;
    bottom:2px; left:0; right:0;
    height:1.5px;
    background: var(--rose-lt);
    transform:scaleX(0);
    transform-origin:left;
    animation: underlineIn 0.6s ease 2s forwards;
  }

  /* ── THIN RULE + INLINE NAME ──────────────────────────── */
  .attribution {
    margin-top: 32px;
    display:flex;
    align-items:center;
    gap: 16px;
    opacity:0;
    transform: translateY(10px);
    animation: riseIn 0.8s ease 1.9s forwards;
  }
  .attr-line {
    width: 36px; height: 1px;
    background: var(--rose);
    opacity:0.5;
    flex-shrink:0;
  }
  .attr-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--rose);
  }

  /* ── BOTTOM PROGRESS LINE ─────────────────────────────── */
  .progress {
    position:fixed;
    bottom:0; left:0;
    height:2px;
    background: linear-gradient(90deg, var(--rose), var(--rose-lt));
    width:0%;
    z-index:20;
    animation: prog 2.8s cubic-bezier(0.4,0,0.6,1) 0.1s forwards;
  }

  /* ── SKIP ─────────────────────────────────────────────── */
  .skip {
    position:fixed; bottom:20px; right:28px; z-index:30;
    font-family:'Outfit',sans-serif; font-size:9px;
    letter-spacing:0.28em; text-transform:uppercase;
    color:rgba(196,115,90,0.4); cursor:pointer;
    opacity:0; animation:fadeOnly 1s ease 2.5s forwards;
    transition:color 0.3s;
  }
  .skip:hover { color:var(--rose); }

  /* ── FLOATING SOFT CIRCLES (atmosphere) ──────────────── */
  .orb {
    position:fixed; border-radius:50%;
    background: radial-gradient(circle, var(--mist) 0%, transparent 70%);
    pointer-events:none; z-index:1;
    animation:orbFloat 8s ease-in-out infinite;
  }
  .orb-1 { width:380px;height:380px; top:-80px; left:30%;  animation-delay:0s;   opacity:0.6; }
  .orb-2 { width:260px;height:260px; bottom:-60px;left:14%; animation-delay:-3s; opacity:0.5; }
  .orb-3 { width:180px;height:180px; top:55%; right:30%;   animation-delay:-5s; opacity:0.4; }

  /* ── KEYFRAMES ────────────────────────────────────────── */
  @keyframes imgReveal {
    to { opacity:1; transform:scale(1); }
  }
  @keyframes fadeOnly {
    to { opacity:1; }
  }
  @keyframes lineIn {
    to { opacity:1; transform:translateX(0) rotate(var(--r,0deg)); }
  }
  @keyframes riseIn {
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes underlineIn {
    to { transform:scaleX(1); }
  }
  @keyframes prog {
    0%   { width:0%; }   60%  { width:70%; }  100% { width:100%; }
  }
  @keyframes orbFloat {
    0%,100% { transform:translateY(0); }
    50%     { transform:translateY(-18px); }
  }

  /* ── EXIT ─────────────────────────────────────────────── */
  .out { animation: exitFade 0.65s ease forwards !important; }
  @keyframes exitFade {
    to { opacity:0; transform:translateY(-18px); }
  }
</style>
</head>
<body>

<!-- atmospheric orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- washed image bleed from right -->
<div class="img-bleed" id="bleed">
  <img src="/mnt/user-data/uploads/1779211607142_image.png" alt=""/>
</div>

<!-- decorative oversized quote mark -->
<div class="big-quote">"</div>

<!-- vertical name (left rail) -->
<div class="name-vert">Toji Fushiguro</div>
<div class="name-dot"></div>

<!-- main stage -->
<div class="stage" id="stage">
  <div class="quote-field">

    <span class="ql ql-1">Talent is just</span>
    <span class="ql ql-2">the starting</span>
    <span class="ql ql-3"><em>point.</em></span>
    <span class="ql ql-4">Will is what</span>
    <span class="ql ql-5">finishes it.</span>

    <div class="attribution">
      <div class="attr-line"></div>
      <span class="attr-name">Toji Fushiguro</span>
    </div>
  </div>
</div>

<div class="progress"></div>
<div class="skip" id="skip">skip ↗</div>

<script>
  const dismiss = () => {
    ['stage','bleed'].forEach(id => document.getElementById(id).classList.add('out'));
  };
  const t = setTimeout(dismiss, 3400);
  document.getElementById('stage').addEventListener('click', () => { clearTimeout(t); dismiss(); });
  document.getElementById('skip').addEventListener('click',  () => { clearTimeout(t); dismiss(); });
</script>

</body>
</html>
