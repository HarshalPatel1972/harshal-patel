<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Outfit:wght@100;200;300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg-abyss:      #030305;
    --text-stellar:  #F8F9FA;
    --text-silver:   #C5C6D0;
    --text-twilight: #5A5B6C;
    --accent-rose:   #EC4899;
  }

  html, body { 
    width:100%; 
    height:100%; 
    overflow:hidden; 
    background:var(--bg-abyss); 
    font-family: 'Fraunces', serif;
    color: var(--text-stellar);
  }

  /* WebGL Viewport */
  #webgl-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    display: block;
  }

  /* ── FALLBACK UI (Only active if WebGL fails/offline) ── */
  #fallback-ui {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 8vw;
    background: var(--bg-abyss);
  }

  .fallback-img {
    position: absolute;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%) brightness(0.2);
    opacity: 0.85;
  }

  .quote-container {
    position: relative;
    z-index: 2;
    max-width: 900px;
    width: 100%;
    text-align: center;
    line-height: 1.35;
    font-size: clamp(24px, 4.2vw, 44px);
    font-weight: 200;
  }

  .word {
    display: inline-block;
    white-space: nowrap;
    margin: 0 0.18em;
  }

  .char {
    display: inline-block;
    font-weight: 200;
    transition: font-weight 0.25s ease, transform 0.25s ease, text-shadow 0.25s ease;
  }

  .word-accent .char.accent-trigger {
    color: var(--accent-rose);
  }

  /* ── HUD / OVERLAYS ───────────────────────────────────── */
  .hud-layer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
  }

  .big-quote {
    font-family: 'Fraunces', serif;
    font-size: 160px;
    font-weight: 100;
    color: rgba(255, 255, 255, 0.012);
    line-height: 1;
  }

  .bottom-hud {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
  }

  .attribution {
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeInHUD 1.2s cubic-bezier(0.16, 1, 0.3, 1) 2s forwards;
  }

  .attr-line {
    width: 24px;
    height: 1px;
    background: var(--text-twilight);
    opacity: 0.3;
  }

  .attr-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-silver);
  }

  .skip-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-twilight);
    cursor: pointer;
    background: none;
    border: none;
    outline: none;
    opacity: 0;
    pointer-events: auto;
    animation: fadeInHUD 1.2s ease 2.5s forwards;
    transition: color 0.3s;
  }

  .skip-btn:hover {
    color: var(--text-stellar);
  }

  /* Progress Line */
  .progress-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(255, 255, 255, 0.01);
    z-index: 12;
  }

  .progress-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--text-twilight), var(--text-silver));
    animation: progressFill 5.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  /* Grain Overlay */
  .grain-overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 9;
    pointer-events: none;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  @keyframes fadeInHUD {
    to { opacity: 0.7; transform: translateY(0); }
  }

  @keyframes progressFill {
    to { width: 100%; }
  }

  /* ── EXIT ── */
  .preloader-out {
    opacity: 0 !important;
    transform: translateY(-5px) !important;
    filter: blur(15px) !important;
    transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), 
                transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), 
                filter 1.2s cubic-bezier(0.16, 1, 0.3, 1) !important;
    pointer-events: none !important;
  }
</style>
</head>
<body id="preloader-body">

<div class="grain-overlay"></div>

<!-- Image element loaded directly in DOM to bypass file:// local CORS triggers -->
<img src="TOJI FUSHIGURO.png" id="portrait-img" style="display: none;" />

<!-- WebGL Layer -->
<canvas id="webgl-canvas"></canvas>

<!-- HUD Controls -->
<div class="hud-layer">
  <div class="big-quote">“</div>
  <div class="bottom-hud">
    <div class="attribution" id="hud-attribution">
      <div class="attr-line"></div>
      <span class="attr-name">Toji Fushiguro</span>
    </div>
    <button class="skip-btn" id="skip-btn">skip ↗</button>
  </div>
</div>

<div class="progress-container">
  <div class="progress-fill"></div>
</div>

<!-- Fallback Container (Used on WebGL errors or offline) -->
<div id="fallback-ui">
  <img src="TOJI FUSHIGURO.png" class="fallback-img" alt="Toji Fushiguro"/>
  <div class="quote-container" id="fallback-quote">
    Talent is just the starting point. Will is what finishes it.
  </div>
</div>

<!-- Load Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  /* ── Web Audio Synth (Cinematic Hum & Paint Brushes) ── */
  let audioCtx = null;
  
  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // Deep Drone Hum
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      const gainNode = audioCtx.createGain();
      
      osc1.type = 'sawtooth';
      osc1.frequency.setValueAtTime(55, audioCtx.currentTime); // Low A
      
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(55.4, audioCtx.currentTime); // Detuned drone
      
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(140, audioCtx.currentTime);
      
      gainNode.gain.setValueAtTime(0.0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.07, audioCtx.currentTime + 3.0);
      
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc1.start();
      osc2.start();
      
      // Periodic brush sweep noises
      setInterval(() => {
        if (audioCtx && audioCtx.state !== 'suspended') {
          playBrushNoise();
        }
      }, 7000);
    } catch(e) {
      console.warn("Audio Context failed to initialize:", e);
    }
  }

  function playBrushNoise() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 2.5; // 2.5s duration
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(180, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(650, audioCtx.currentTime + 1.2);
    filter.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 2.5);
    
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 1.0);
    gainNode.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 2.5);
    
    source.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    source.start();
  }

  /* ── 2D Displacement Text Engine (Writes to WebGL Map) ── */
  const dispCanvas = document.createElement('canvas');
  dispCanvas.width = 1024;
  dispCanvas.height = 1024;
  const dispCtx = dispCanvas.getContext('2d');

  class Drip {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.length = Math.random() * 70 + 20;
      this.currentY = y;
      this.speed = Math.random() * 1.2 + 0.4;
      this.opacity = 1.0;
    }
    update() {
      this.currentY += this.speed;
      this.opacity -= 0.008;
    }
    draw(ctx) {
      ctx.strokeStyle = `rgba(255, 0, 0, ${this.opacity * 0.65})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x, this.currentY);
      ctx.stroke();
    }
  }

  let drips = [];
  let line1_progress = 0.0;
  let line2_progress = 0.0;
  let sig_progress = 0.0;
  let timeVal = 0.0;
  let lastCharIndex = -1;

  function updateDripsAndCanvas(mouseX, mouseY) {
    timeVal += 0.016;

    // Clear with solid black (zero height values)
    dispCtx.fillStyle = 'black';
    dispCtx.fillRect(0, 0, dispCanvas.width, dispCanvas.height);

    // Draw active dripping streams (Red Channel)
    drips.forEach(d => {
      d.update();
      d.draw(dispCtx);
    });
    drips = drips.filter(d => d.opacity > 0);

    // Draw mouse smear (Green Channel)
    dispCtx.fillStyle = 'rgba(0, 255, 0, 0.12)';
    dispCtx.beginPath();
    dispCtx.arc(mouseX * 1024, (1.0 - mouseY) * 1024, 50, 0, Math.PI * 2);
    dispCtx.fill();

    // Trigger Writing Sequence (Red Channel)
    dispCtx.fillStyle = 'rgba(255, 0, 0, 1)';
    dispCtx.shadowColor = 'rgba(255, 0, 0, 1)';
    dispCtx.shadowBlur = 12;
    dispCtx.font = '300 40px "Fraunces"';
    dispCtx.textAlign = 'left';

    const text1 = "Talent is just the starting point.";
    const text2 = "Will is what finishes it.";

    let activeFingerX = 512;
    let activeFingerY = 512;
    let currentlyWriting = false;

    // Line 1 Timeline
    if (timeVal > 1.8) {
      if (line1_progress < 1.0) {
        line1_progress += 0.0042;
        if (line1_progress > 1.0) line1_progress = 1.0;
      }
      const count1 = Math.floor(text1.length * line1_progress);
      const textToDraw = text1.substring(0, count1);
      const w1 = dispCtx.measureText(text1).width;
      const startX1 = 512 - w1 / 2;
      dispCtx.fillText(textToDraw, startX1, 460);

      activeFingerX = startX1 + dispCtx.measureText(textToDraw).width;
      activeFingerY = 460;
      currentlyWriting = line1_progress < 1.0;

      // Spawn drip on character reveal
      if (count1 > lastCharIndex && count1 < text1.length) {
        drips.push(new Drip(activeFingerX, activeFingerY));
        lastCharIndex = count1;
      }
    }

    // Line 2 Timeline
    if (line1_progress >= 1.0) {
      if (line2_progress < 1.0) {
        line2_progress += 0.005;
        if (line2_progress > 1.0) line2_progress = 1.0;
      }
      const count2 = Math.floor(text2.length * line2_progress);
      const textToDraw2 = text2.substring(0, count2);
      const w2 = dispCtx.measureText(text2).width;
      const startX2 = 512 - w2 / 2;
      dispCtx.fillText(textToDraw2, startX2, 530);

      activeFingerX = startX2 + dispCtx.measureText(textToDraw2).width;
      activeFingerY = 530;
      currentlyWriting = line2_progress < 1.0;

      const offsetIdx = count2 + text1.length;
      if (offsetIdx > lastCharIndex && count2 < text2.length) {
        drips.push(new Drip(activeFingerX, activeFingerY));
        lastCharIndex = offsetIdx;
      }
    }

    // Drawing tip glowing contact dot
    if (currentlyWriting) {
      dispCtx.shadowBlur = 24;
      dispCtx.fillStyle = 'rgba(255, 0, 0, 0.9)';
      dispCtx.beginPath();
      dispCtx.arc(activeFingerX, activeFingerY, 14, 0, Math.PI * 2);
      dispCtx.fill();
    }
  }

  /* ── WebGL Three.js Scene Setup ── */
  let renderer, scene, camera, material, textureMesh;
  let dispTexture;
  let rawMouseX = 0.5, rawMouseY = 0.5;
  let smoothMouseX = 0.5, smoothMouseY = 0.5;
  let blinkVal = 0.0, blinkCounter = 0;

  const vertexShader = `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position, 1.0);
    }
  `;

  const fragmentShader = `
    uniform sampler2D u_portrait;
    uniform sampler2D u_displacement;
    uniform float u_time;
    uniform vec2 u_mouse;
    uniform vec2 u_uv_scale;
    uniform float u_blink;
    varying vec2 vUv;

    // Simple procedural wave noise for wet oil paint currents
    float waveNoise(vec2 p) {
      float t = u_time * 0.02;
      float n = sin(p.x * 6.0 + t) * cos(p.y * 6.0 + t);
      n += sin(p.x * 12.0 - t) * cos(p.y * 10.0 + t) * 0.5;
      n += sin(p.x * 24.0 + t * 1.5) * cos(p.y * 18.0 - t * 1.5) * 0.25;
      return n / 1.75;
    }

    void main() {
      // Cover mapping for screen dimensions
      vec2 uv = (vUv - 0.5) * u_uv_scale + 0.5;

      // Micro undulations inside the canvas
      float n = waveNoise(uv);
      vec2 noiseOffset = vec2(n, waveNoise(uv + vec2(13.0, 37.0))) * 0.003;

      // Sample displacement map values
      vec2 texel = vec2(1.0 / 1024.0);
      float dC = texture2D(u_displacement, vUv).r; // Text + Drips
      float dM = texture2D(u_displacement, vUv).g; // Mouse smear

      // Height gradient for normal ridging maps
      float hL = texture2D(u_displacement, vUv - vec2(texel.x, 0.0)).r + texture2D(u_displacement, vUv - vec2(texel.x, 0.0)).g * 0.45;
      float hR = texture2D(u_displacement, vUv + vec2(texel.x, 0.0)).r + texture2D(u_displacement, vUv + vec2(texel.x, 0.0)).g * 0.45;
      float hD = texture2D(u_displacement, vUv - vec2(0.0, texel.y)).r + texture2D(u_displacement, vUv - vec2(0.0, texel.y)).g * 0.45;
      float hU = texture2D(u_displacement, vUv + vec2(0.0, texel.y)).r + texture2D(u_displacement, vUv + vec2(0.0, texel.y)).g * 0.45;
      
      // Calculate normal representation vector
      vec3 normal = normalize(vec3(hL - hR, hD - hU, 0.075));

      // Push paint outward around ridges
      vec2 pushDir = vec2(hR - hL, hU - hD) * 0.015;

      // Face gaze tracking shift (broad radius around eye line y:0.62)
      vec2 faceCenter = vec2(0.5, 0.62);
      float distToFace = distance(uv, faceCenter);
      vec2 gazeOffset = vec2(0.0);
      if (distToFace < 0.28) {
        float fWeight = smoothstep(0.28, 0.0, distToFace);
        gazeOffset = (u_mouse - 0.5) * 0.011 * fWeight;
      }

      // Eyelid blinking vertical pinch centered around y: 0.635
      vec2 finalUV = uv + noiseOffset - pushDir + gazeOffset;
      if (u_blink > 0.0) {
        float eyeBand = smoothstep(0.035, 0.0, abs(uv.y - 0.635)) * smoothstep(0.18, 0.0, abs(uv.x - 0.5));
        finalUV.y = mix(finalUV.y, 0.635, u_blink * eyeBand * 0.9);
      }

      vec4 portraitColor = texture2D(u_portrait, finalUV);

      // Gold under-painting reflections
      vec3 goldBase = vec3(0.92, 0.72, 0.32);
      vec3 lightDir = normalize(vec3(u_mouse - 0.5, 1.3));
      vec3 viewDir = vec3(0.0, 0.0, 1.0);
      float spec = pow(max(dot(reflect(-lightDir, normal), viewDir), 0.0), 32.0);
      vec3 goldColor = goldBase + vec3(spec * 0.5);

      // Blend paint and gold
      vec4 finalColor = mix(portraitColor, vec4(goldColor, 1.0), dC * 0.95);

      // Ridges specular gloss
      float paintSpec = pow(max(dot(reflect(-lightDir, normal), viewDir), 0.0), 10.0);
      finalColor.rgb += vec3(paintSpec * 0.16 * (dC + dM));

      gl_FragColor = finalColor;
    }
  `;

  // Compute cover dimensions for custom uniforms
  function calculateUVScale() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const aspectWindow = w / h;
    const aspectImg = 1200 / 1600; // Expected Toji image ratio

    let scaleX = 1;
    let scaleY = 1;
    if (aspectWindow > aspectImg) {
      scaleY = aspectWindow / aspectImg;
    } else {
      scaleX = aspectImg / aspectWindow;
    }
    return [scaleX, scaleY];
  }

  function initWebGL() {
    const canvas = document.getElementById('webgl-canvas');
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    scene = new THREE.Scene();
    camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const img = document.getElementById('portrait-img');
    const portraitTexture = new THREE.Texture(img);
    portraitTexture.minFilter = THREE.LinearFilter;
    portraitTexture.magFilter = THREE.LinearFilter;

    if (img.complete) {
      portraitTexture.needsUpdate = true;
    } else {
      img.onload = () => { portraitTexture.needsUpdate = true; };
    }

    dispTexture = new THREE.CanvasTexture(dispCanvas);
    dispTexture.minFilter = THREE.LinearFilter;
    dispTexture.magFilter = THREE.LinearFilter;

    const scales = calculateUVScale();

    material = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      uniforms: {
        u_portrait: { value: portraitTexture },
        u_displacement: { value: dispTexture },
        u_time: { value: 0 },
        u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        u_uv_scale: { value: new THREE.Vector2(scales[0], scales[1]) },
        u_blink: { value: 0 }
      }
    });

    const geometry = new THREE.PlaneGeometry(2, 2);
    textureMesh = new THREE.Mesh(geometry, material);
    scene.add(textureMesh);
  }

  function animateWebGL() {
    requestAnimationFrame(animateWebGL);

    // Smooth mouse coordinates tracking
    smoothMouseX += (rawMouseX - smoothMouseX) * 0.08;
    smoothMouseY += (rawMouseY - smoothMouseY) * 0.08;

    // Blink controller (eye pinch)
    blinkCounter++;
    if (blinkCounter > 260) {
      if (blinkCounter < 272) {
        blinkVal = Math.sin((blinkCounter - 260) * Math.PI / 12);
      } else {
        blinkVal = 0.0;
        blinkCounter = 0;
      }
    }

    // Sync textures & values
    updateDripsAndCanvas(smoothMouseX, smoothMouseY);
    dispTexture.needsUpdate = true;

    if (material) {
      material.uniforms.u_time.value = performance.now() * 0.001;
      material.uniforms.u_mouse.value.set(smoothMouseX, smoothMouseY);
      material.uniforms.u_blink.value = blinkVal;
    }

    renderer.render(scene, camera);
  }

  // Handle Resize
  window.addEventListener('resize', () => {
    if (renderer && material) {
      renderer.setSize(window.innerWidth, window.innerHeight);
      const scales = calculateUVScale();
      material.uniforms.u_uv_scale.value.set(scales[0], scales[1]);
    }
  });

  // Track cursor
  document.addEventListener('mousemove', (e) => {
    rawMouseX = e.clientX / window.innerWidth;
    rawMouseY = 1.0 - (e.clientY / window.innerHeight);
    
    // Play sound on contact
    if (audioCtx) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      if (Math.random() < 0.04) {
        playBrushNoise();
      }
    }
  });

  /* ── Fallback Setup (Used only if WebGL breaks) ── */
  function initFallbackCSS() {
    const fallQuote = document.getElementById('fallback-quote');
    if (!fallQuote) return;
    
    const text = fallQuote.innerText.trim();
    fallQuote.innerHTML = '';
    const words = text.split(' ');
    
    words.forEach(wText => {
      const wSpan = document.createElement('span');
      wSpan.className = 'word';
      if (wText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").toUpperCase() === 'POINT') {
        wSpan.classList.add('word-accent');
      }
      for (let i = 0; i < wText.length; i++) {
        const cSpan = document.createElement('span');
        cSpan.className = 'char';
        cSpan.innerText = wText[i];
        if (wSpan.classList.contains('word-accent')) {
          cSpan.classList.add('accent-trigger');
        }
        wSpan.appendChild(cSpan);
      }
      fallQuote.appendChild(wSpan);
    });

    // Simple fallback cursor hover behavior
    document.addEventListener('mousemove', (e) => {
      const chars = document.querySelectorAll('.char');
      chars.forEach(char => {
        const rect = char.getBoundingClientRect();
        const dx = e.clientX - (rect.left + rect.width / 2);
        const dy = e.clientY - (rect.top + rect.height / 2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
          const factor = 1 - (dist / 150);
          char.style.fontWeight = 200 + Math.round(700 * factor);
          char.style.transform = `scale(${1 + 0.15*factor})`;
        } else {
          char.style.fontWeight = '200';
          char.style.transform = 'scale(1)';
        }
      });
    });
  }

  // Dismiss flow
  const dismiss = () => {
    // Synth fadeout
    if (audioCtx) {
      const gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
    }

    ['webgl-canvas', 'fallback-ui', 'skip-btn', 'hud-attribution', '.progress-container', '.big-quote'].forEach(selector => {
      let el = document.getElementById(selector);
      if (!el) el = document.querySelector(selector);
      if (el) el.classList.add('preloader-out');
    });
  };

  document.getElementById('skip-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    dismiss();
  });
  document.body.addEventListener('click', () => {
    initAudio(); // Audio context must rise on user interaction bounds
    dismiss();
  });

  // Entry Check
  window.onload = () => {
    try {
      if (typeof THREE === 'undefined') {
        throw new Error('Three.js failed to fetch');
      }
      initWebGL();
      animateWebGL();
    } catch(e) {
      console.warn("WebGL initialization failed, falling back:", e);
      const canvasEl = document.getElementById('webgl-canvas');
      if (canvasEl) canvasEl.style.display = 'none';
      const fallbackEl = document.getElementById('fallback-ui');
      if (fallbackEl) fallbackEl.style.display = 'flex';
      initFallbackCSS();
    }
  };
</script>

</body>
</html>
