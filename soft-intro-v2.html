<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Playfair+Display:ital,wght@1,400;1,700&family=Outfit:wght@100;200;300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    /* Foundations */
    --bg-abyss:      #08080E;
    --bg-void:       #111118;
    --bg-obsidian:   #1A1A27;
    --bg-graphite:   #242436;
    --bg-storm:      #2E2E45;

    /* Typography & Neutrals */
    --text-stellar:  #F2F2FA;
    --text-silver:   #C4C4D8;
    --text-twilight: #7A7A96;

    /* Signature Accents */
    --accent-iris:   #8B5CF6;
    --accent-rose:   #F472B6; /* Petal Flame */
    --accent-cyan:   #06B6D4; /* Arctic Pulse */
    --accent-orange: #F97316; /* Ember Glow */
    --accent-green:  #10B981; /* Surge */
    --accent-red:    #EF4444; /* Crimson Core */
  }

  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg-abyss); }

  /* ── IMAGE — washed bleed, not a portrait ─────────────── */
  .img-bleed {
    position:fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
  }
  .img-bleed img {
    width:100%; height:100%;
    object-fit:cover;
    object-position:center;
    filter: grayscale(100%);
    opacity: 1;
    animation: kenBurns 28s ease-in-out infinite;
  }
  /* Overlay to soften the contrast/brightness of the image */
  .img-bleed::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background: rgba(8, 8, 14, 0.70); /* Dark Abyss wash overlay */
    display: block;
  }
  .img-bleed::after {
    display: none;
  }

  /* ── DECORATIVE BIG " ─────────────────────────────────── */
  .big-quote {
    position:fixed;
    top: -20px; left: 32px;
    font-family: 'Fraunces', serif;
    font-size: clamp(220px, 28vw, 320px);
    font-style: normal;
    line-height:1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(139, 92, 246, 0.15);
    z-index: 1;
    pointer-events:none;
    user-select:none;
    opacity:0;
    animation: fadeOnly 1.4s ease 0.5s forwards;
  }

  /* ── STAGE ────────────────────────────────────────────── */
  .stage {
    position:fixed; inset:0; z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* ── QUOTE HALO BACKLIGHT ────────────────────────────── */
  .quote-halo {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 250px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, rgba(244, 114, 182, 0.03) 45%, transparent 70%);
    filter: blur(40px);
    z-index: -1;
    pointer-events: none;
    opacity: 0;
    animation: haloReveal 1.6s ease 1s forwards, haloBreathe 8s ease-in-out infinite 2.6s;
  }

  @keyframes haloReveal {
    to { opacity: 1; }
  }

  @keyframes haloBreathe {
    0%, 100% {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    50% {
      transform: translate(-50%, -50%) scale(1.12);
      opacity: 0.75;
    }
  }

  /* ── QUOTE BLOCK — deconstructed ─────────────────────── */
  .quote-field {
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap: 12px;
    z-index:5;
  }

  #quote-canvas {
    display: block;
    width: 900px;
    max-width: 90vw;
    height: 160px;
    z-index: 6;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeOnly 1.2s ease 0.6s forwards;
  }

  /* each line is centered + arrives from alternate directions */
  .ql {
    font-family: 'Fraunces', serif;
    font-style: normal;
    font-weight: 400;
    color: var(--text-stellar);
    line-height: 1.15;
    opacity:0;
    white-space: nowrap;
    text-align: center;
  }
  
  /* ── CHROMATIC LIQUID CHROME EFFECTS ── */
  .chrome-text {
    position: relative;
    display: inline-block;
    filter: url(#chrome-filter);
  }

  .chrome-text::before,
  .chrome-text::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    font-family: inherit;
    font-size: inherit;
    font-style: inherit;
    font-weight: inherit;
    line-height: inherit;
    -webkit-text-fill-color: initial;
    z-index: -1;
  }

  .chrome-text::before {
    color: var(--accent-cyan);
    transform: translate(1px, 1px);
    filter: blur(2px);
    opacity: 0.35;
    animation: aberration 0.5s infinite;
  }

  .chrome-text::after {
    color: var(--accent-rose);
    transform: translate(-1px, -1px);
    filter: blur(2px);
    opacity: 0.25;
    animation: aberration 0.5s infinite reverse;
  }

  @keyframes shineSweep {
    0% { background-position: 0% 0%; }
    50% { background-position: 0% 100%; }
    100% { background-position: 0% 0%; }
  }

  @keyframes aberration {
    0% { transform: translate(1px, 1px); }
    25% { transform: translate(-1px, 1.2px); }
    50% { transform: translate(1.2px, -1px); }
    75% { transform: translate(-1.2px, -1.2px); }
    100% { transform: translate(1px, 1px); }
  }

  .ql-1 {
    font-size: clamp(20px, 3.2vw, 34px);
    transform: translateX(-30px) rotate(-0.5deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
  }
  .ql-2 {
    font-size: clamp(20px, 3.2vw, 34px);
    transform: translateX(30px) rotate(0.3deg);
    animation: lineIn 1s cubic-bezier(0.22,1,0.36,1) 1.0s forwards;
  }

  /* highlight accent on key word */
  .ql em {
    font-style: normal;
    color: var(--accent-rose);
    position:relative;
  }
  .ql em::after {
    content:'';
    position:absolute;
    bottom:2px; left:0; right:0;
    height:1.5px;
    background: var(--accent-rose);
    transform:scaleX(0);
    transform-origin:left;
    animation: underlineIn 0.6s ease 2s forwards;
  }

  /* ── THIN RULE + INLINE NAME ──────────────────────────── */
  .attribution {
    margin-top: 36px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 16px;
    opacity:0;
    transform: translateY(10px);
    animation: riseIn 0.8s ease 1.9s forwards;
  }
  .attr-line {
    width: 36px; height: 1px;
    background: var(--accent-iris);
    opacity:0.5;
    flex-shrink:0;
  }
  .attr-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-silver);
  }

  /* ── BOTTOM PROGRESS LINE ─────────────────────────────── */
  .progress {
    position:fixed;
    bottom:0; left:0;
    height:2px;
    background: linear-gradient(90deg, var(--accent-iris), var(--accent-rose));
    width:0%;
    z-index:20;
    animation: prog 2.8s cubic-bezier(0.4,0,0.6,1) 0.1s forwards;
  }

  /* ── SKIP ─────────────────────────────────────────────── */
  .skip {
    position:fixed; bottom:20px; right:28px; z-index:30;
    font-family:'Outfit',sans-serif; font-size:9px;
    letter-spacing:0.28em; text-transform:uppercase;
    color: var(--text-twilight); opacity:0.55; cursor:pointer;
    animation:fadeOnly 1s ease 2.5s forwards;
    transition:color 0.3s, opacity 0.3s;
  }
  .skip:hover { color:var(--accent-rose); opacity: 1; }

  /* ── FLOATING SOFT CIRCLES (atmosphere) ──────────────── */
  .orb {
    position:fixed; border-radius:50%;
    pointer-events:none; z-index:1;
    animation:orbFloat 8s ease-in-out infinite;
  }
  .orb-1 {
    width:380px;height:380px; top:-80px; left:30%; animation-delay:0s; opacity:0.5;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
  }
  .orb-2 {
    width:260px;height:260px; bottom:-60px;left:14%; animation-delay:-3s; opacity:0.4;
    background: radial-gradient(circle, rgba(244, 114, 182, 0.08) 0%, transparent 70%);
  }
  .orb-3 {
    width:180px;height:180px; top:55%; right:30%; animation-delay:-5s; opacity:0.3;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
  }

  /* ── KEYFRAMES ────────────────────────────────────────── */
  @keyframes imgReveal {
    to { opacity:0.45; transform:scale(1); }
  }
  @keyframes fadeOnly {
    to { opacity:1; }
  }
  @keyframes lineIn {
    to { opacity:1; transform:translateX(0) rotate(var(--r,0deg)); }
  }
  @keyframes riseIn {
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes underlineIn {
    to { transform:scaleX(1); }
  }
  @keyframes prog {
    0%   { width:0%; }   60%  { width:70%; }  100% { width:100%; }
  }
  @keyframes orbFloat {
    0%,100% { transform:translateY(0); }
    50%     { transform:translateY(-18px); }
  }

  @keyframes kenBurns {
    0%, 100% { transform: scale(1) translate(0, 0); }
    50% { transform: scale(1.08) translate(-1%, -0.5%); }
  }

  /* ambient dust particles floating animation */
  @keyframes sparkleFloat-1 {
    0%, 100% { transform: translateY(0) translateX(0) scale(1); }
    50% { transform: translateY(-80px) translateX(30px) scale(1.15); }
  }
  @keyframes sparkleFloat-2 {
    0%, 100% { transform: translateY(0) translateX(0) scale(1.15); }
    50% { transform: translateY(-60px) translateX(-30px) scale(0.85); }
  }

  /* ── SMOOTH PARALLAX SUPPORT ── */
  .stage, .img-bleed {
    transition: transform 0.45s cubic-bezier(0.1, 0.8, 0.3, 1);
    will-change: transform;
  }

  /* ── EXIT (Temporarily disabled animation) ─────────────── */
  .out { display: none !important; }
  /* @keyframes exitFade {
    to { opacity:0; transform:translateY(-18px); }
  } */

  .grain-overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 99;
    pointer-events: none;
    opacity: 0.022;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    animation: grainMove 0.8s steps(10) infinite;
  }

  @keyframes grainMove {
    0%, 100% { background-position: 0 0; }
    10% { background-position: -5% -10%; }
    20% { background-position: -15% 5%; }
    30% { background-position: 7% -25%; }
    40% { background-position: -5% 25%; }
    50% { background-position: -15% 10%; }
    60% { background-position: 15% -5%; }
    70% { background-position: 0% 15%; }
    80% { background-position: 3% 35%; }
    90% { background-position: -10% 10%; }
  }
</style>
</head>
<body>

<div class="grain-overlay"></div>

<!-- invisible SVG filter for liquid/chrome displacement -->
<svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
  <filter id="chrome-filter">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="5">
      <animate attributeName="baseFrequency" dur="8s" values="0.04;0.05;0.04" repeatCount="indefinite" />
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" scale="8" />
  </filter>
</svg>

<!-- atmospheric orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- washed image bleed from right -->
<div class="img-bleed" id="bleed">
  <img src="TOJI FUSHIGURO.png" alt="Toji Fushiguro"/>
</div>

<!-- decorative oversized quote mark -->
<div class="big-quote">"</div>



<!-- main stage -->
<div class="stage" id="stage">
  <div class="quote-field">
    <div class="quote-halo"></div>
    <canvas id="quote-canvas" width="900" height="160"></canvas>
    <div class="quote-text-hidden" style="position: absolute; opacity: 0; pointer-events: none; height: 0; overflow: hidden;">
      <span class="ql ql-1 chrome-text" data-text="Talent is just the starting point.">Talent is just the starting <em>point.</em></span>
      <span class="ql ql-2 chrome-text" data-text="Will is what finishes it.">Will is what finishes it.</span>
    </div>

    <div class="attribution">
      <div class="attr-line"></div>
      <span class="attr-name">Toji Fushiguro</span>
    </div>
  </div>
</div>

<div class="progress"></div>
<div class="skip" id="skip">skip ↗</div>

<script>
  // Dismiss/Skip handler
  const dismiss = () => {
    ['stage','bleed'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('out');
    });
  };
  // const t = setTimeout(dismiss, 5500); // Disabled auto-dismiss to inspect design
  
  const stageEl = document.getElementById('stage');
  const skipEl = document.getElementById('skip');
  
  if (stageEl) {
    stageEl.addEventListener('click', () => { dismiss(); });
  }
  if (skipEl) {
    skipEl.addEventListener('click',  () => { dismiss(); });
  }

  // Interactive 3D Parallax Movement
  document.addEventListener('mousemove', (e) => {
    const x = (window.innerWidth / 2 - e.clientX) / 45;
    const y = (window.innerHeight / 2 - e.clientY) / 45;
    
    const bleed = document.getElementById('bleed');
    const stage = document.getElementById('stage');
    
    if (bleed) {
      bleed.style.transform = `translate3d(${-x * 0.5}px, ${-y * 0.5}px, 0) scale(1.02)`;
    }
    if (stage) {
      stage.style.transform = `translate3d(${x * 0.8}px, ${y * 0.8}px, 0)`;
    }
  });

  // Ambient floating ink/sparkle motes
  const createSparkles = () => {
    const container = document.createElement('div');
    container.style.position = 'fixed';
    container.style.inset = '0';
    container.style.pointerEvents = 'none';
    container.style.zIndex = '1';
    document.body.appendChild(container);

    const colors = ['#8B5CF6', '#F472B6', '#06B6D4']; // Iris, Petal Flame, Arctic Pulse
    for (let i = 0; i < 24; i++) {
      const sparkle = document.createElement('div');
      const size = Math.random() * 4 + 1.5;
      sparkle.style.width = `${size}px`;
      sparkle.style.height = `${size}px`;
      sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
      sparkle.style.borderRadius = '50%';
      sparkle.style.position = 'absolute';
      sparkle.style.top = `${Math.random() * 100}%`;
      sparkle.style.left = `${Math.random() * 100}%`;
      sparkle.style.opacity = Math.random() * 0.22 + 0.05;
      sparkle.style.filter = 'blur(0.5px)';
      const animName = Math.random() > 0.5 ? 'sparkleFloat-1' : 'sparkleFloat-2';
      sparkle.style.animation = `${animName} ${Math.random() * 10 + 8}s ease-in-out infinite`;
      sparkle.style.animationDelay = `${Math.random() * -10}s`;
      container.appendChild(sparkle);
    }
  };

  createSparkles();

  // Interactive Physics Particle Canvas for Quote Text
  const initCanvasParticles = () => {
    const canvas = document.getElementById('quote-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    const offscreen = document.createElement('canvas');
    const offCtx = offscreen.getContext('2d');
    offscreen.width = 900;
    offscreen.height = 160;
    
    // Draw text to offscreen canvas
    offCtx.fillStyle = '#ffffff';
    offCtx.textAlign = 'left';
    offCtx.textBaseline = 'middle';
    
    // We want "Fraunces" normal weight
    offCtx.font = 'normal 400 34px "Fraunces", serif';
    
    const text1 = "Talent is just the starting ";
    const text2 = "point.";
    const w1 = offCtx.measureText(text1).width;
    const w2 = offCtx.measureText(text2).width;
    const totalW = w1 + w2;
    
    const startX = 450 - totalW / 2;
    offCtx.fillText(text1, startX, 48);
    
    // Accent text
    offCtx.fillStyle = '#feffff';
    offCtx.fillText(text2, startX + w1, 48);
    
    // Accent underline
    offCtx.fillRect(startX + w1, 70, w2, 2);
    
    // Line 2
    offCtx.fillStyle = '#ffffff';
    offCtx.textAlign = 'center';
    offCtx.fillText("Will is what finishes it.", 450, 108);
    
    // Scan pixels
    const imgData = offCtx.getImageData(0, 0, 900, 160);
    const data = imgData.data;
    const particles = [];
    const step = 3;
    
    for (let y = 0; y < 160; y += step) {
      for (let x = 0; x < 900; x += step) {
        const idx = (y * 900 + x) * 4;
        const r = data[idx];
        const g = data[idx+1];
        const b = data[idx+2];
        const a = data[idx+3];
        
        if (a > 120) {
          const isAccent = (r === 254 && g === 255 && b === 255);
          particles.push({
            x: Math.random() * 900,
            y: Math.random() * 160,
            originX: x,
            originY: y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            isAccent: isAccent,
            size: Math.random() * 1.2 + 1.0,
            density: Math.random() * 18 + 8
          });
        }
      }
    }
    
    let mouse = { x: -1000, y: -1000, active: false };
    
    window.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * canvas.width;
      mouse.y = ((e.clientY - rect.top) / rect.height) * canvas.height;
      mouse.active = true;
    });
    
    window.addEventListener('mouseleave', () => {
      mouse.active = false;
    });
    
    // Support touch devices
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((e.touches[0].clientX - rect.left) / rect.width) * canvas.width;
        mouse.y = ((e.touches[0].clientY - rect.top) / rect.height) * canvas.height;
        mouse.active = true;
      }
    }, { passive: true });
    window.addEventListener('touchend', () => {
      mouse.active = false;
    });
    
    const stiffness = 0.09;
    const damping = 0.84;
    const repulsionRadius = 75;
    const repulsionForce = 60;
    
    let active = true;
    
    const animate = () => {
      if (!active) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        
        // Return to origin spring force
        let dx = p.originX - p.x;
        let dy = p.originY - p.y;
        p.vx += dx * stiffness;
        p.vy += dy * stiffness;
        
        // Mouse interaction
        if (mouse.active) {
          let mdx = p.x - mouse.x;
          let mdy = p.y - mouse.y;
          let distSq = mdx * mdx + mdy * mdy;
          let dist = Math.sqrt(distSq);
          
          if (dist < repulsionRadius) {
            let force = (repulsionRadius - dist) / repulsionRadius;
            let angle = Math.atan2(mdy, mdx);
            
            p.vx += Math.cos(angle) * force * repulsionForce * (1 / p.density) * 10;
            p.vy += Math.sin(angle) * force * repulsionForce * (1 / p.density) * 10;
          }
        }
        
        // Brownian noise (shimmer)
        p.vx += (Math.random() - 0.5) * 0.15;
        p.vy += (Math.random() - 0.5) * 0.15;
        
        p.vx *= damping;
        p.vy *= damping;
        
        p.x += p.vx;
        p.y += p.vy;
        
        // Draw particle
        if (p.isAccent) {
          ctx.fillStyle = '#F472B6'; // Petal Flame
        } else {
          // Iris to Arctic Pulse color scheme based on origin x position
          const ratio = p.originX / canvas.width;
          if (ratio < 0.42) {
            ctx.fillStyle = '#8B5CF6'; // Iris
          } else if (ratio < 0.72) {
            ctx.fillStyle = '#F2F2FA'; // Stellar White
          } else {
            ctx.fillStyle = '#06B6D4'; // Arctic Pulse
          }
        }
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      
      requestAnimationFrame(animate);
    };
    
    // Start animation loop
    animate();
    
    // Allow clean dynamic scale or resize
    window.addEventListener('resize', () => {
      mouse.active = false;
    });
  };

  // Run when fonts are fully loaded to ensure precise layout measurements
  if (document.fonts) {
    document.fonts.ready.then(() => {
      setTimeout(initCanvasParticles, 100);
    });
  } else {
    window.addEventListener('load', () => {
      setTimeout(initCanvasParticles, 100);
    });
  }
</script>

</body>
</html>
